<aside class="sidebar">
  <h3>Categorie</h3>

  <button
    class="category-button"
    [class.active]="selectedId === null"
    (click)="selectCategory(null)"
  >
    <span class="category-emoji" aria-hidden="true">🛒</span>
    <span class="category-label">Tutte</span>
  </button>

  <button
    class="category-button"
    *ngFor="let categoria of categorie"
    [class.active]="selectedId === categoria.id"
    (click)="selectCategory(categoria.id)"
  >
    <span class="category-emoji" aria-hidden="true">🥬</span>
    <span class="category-label">{{ categoria.nome }}</span>
  </button>
</aside>
