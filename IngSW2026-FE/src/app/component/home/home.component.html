<app-navbar (searchChange)="onSearchChange($event)"></app-navbar>

<div class="home-layout">
  <app-sidebar
    [categorie]="categorie"
    (categorySelected)="onCategorySelected($event)"
  ></app-sidebar>

  <main class="products-area">
    <h2>Prodotti disponibili</h2>

    <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>

    <div class="product-grid" *ngIf="prodotti.length > 0; else noProducts">
      <app-product-card
        *ngFor="let prodotto of prodotti"
        [prodotto]="prodotto"
      ></app-product-card>
    </div>

    <ng-template #noProducts>
      <p class="empty-message">Nessun prodotto trovato con i filtri selezionati.</p>
    </ng-template>
  </main>
</div>
