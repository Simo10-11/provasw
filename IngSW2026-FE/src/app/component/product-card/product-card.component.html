<article class="card">
  <img
    src="https://via.placeholder.com/240x150?text=Prodotto"
    alt="Immagine prodotto"
  />

  <h4>{{ prodotto.nome }}</h4>
  <p class="description">{{ prodotto.descrizione || 'Nessuna descrizione disponibile' }}</p>
  <p class="price">{{ prodotto.prezzo | number:'1.2-2' }} EUR</p>

  <button (click)="addToCart()">Aggiungi al carrello</button>
</article>
